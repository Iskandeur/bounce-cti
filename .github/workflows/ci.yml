name: CI merge-gate

# Guards `main` against breaking commits. Production deploys on every push to
# `main` (see deploy.yml) with no staging, so this gate must pass before merge:
# it fails if the backend does not import or the frontend does not build.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-import:
    name: Backend imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Byte-compile backend
        run: python -m compileall -q backend
      - name: Import FastAPI app
        run: python -c "import backend.main; print('backend.main imported OK')"

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest backend/tests -q

  frontend-build:
    name: Frontend builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
