name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP="/opt/bounce-cti"
            cd "$APP"

            git fetch origin main
            BEFORE=$(git rev-parse HEAD)
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "==> No changes, nothing to deploy."
              exit 0
            fi

            echo "==> Deploying ${BEFORE:0:8} -> ${AFTER:0:8}"

            if git diff --name-only "$BEFORE" "$AFTER" | grep -q "requirements.txt"; then
              echo "==> requirements.txt changed, installing deps..."
              "$APP/.venv/bin/pip" install --quiet -r requirements.txt
            fi

            if git diff --name-only "$BEFORE" "$AFTER" | grep -q "^frontend/"; then
              echo "==> Frontend changed, rebuilding..."
              cd "$APP/frontend" && npm ci --silent && npm run build && cd "$APP"
            fi

            # Preflight: the agent runner cannot run investigations without the
            # `claude` CLI. The 2026-06-17 outage was a PATH/binary move that only
            # surfaced at the first investigation (0 nodes), not at deploy. Catch
            # it here. CLAUDE_BIN in .env is the authoritative path (set to an
            # absolute location during that incident); a stale value is the
            # realistic regression, so treat set-but-not-executable as fatal.
            echo "==> Preflight: resolving claude CLI..."
            CLAUDE_BIN_CFG=$(grep -E '^CLAUDE_BIN=' "$APP/.env" 2>/dev/null | head -n1 | cut -d= -f2- | tr -d "\"'" | xargs)
            if [ -n "$CLAUDE_BIN_CFG" ]; then
              if [ -x "$CLAUDE_BIN_CFG" ]; then
                echo "==> Preflight OK: CLAUDE_BIN=$CLAUDE_BIN_CFG"
              else
                echo "==> ERROR: CLAUDE_BIN ($CLAUDE_BIN_CFG) from .env is not executable — aborting before restart."
                exit 1
              fi
            elif command -v claude > /dev/null 2>&1; then
              echo "==> Preflight OK: claude on PATH ($(command -v claude))"
            elif ls "$HOME/.local/bin/claude" "$HOME/.npm-global/bin/claude" /usr/local/bin/claude /usr/bin/claude > /dev/null 2>&1; then
              echo "==> Preflight WARN: claude not on deploy PATH but found in a known install dir; agent_runner._resolve_claude_bin should still find it under the service user. Set CLAUDE_BIN in .env to silence this."
            else
              echo "==> Preflight WARN: could not resolve claude as the deploy user (the service user's env may differ). Set CLAUDE_BIN in .env to an absolute path to make this check authoritative."
            fi

            echo "==> Restarting service..."
            sudo -n /bin/systemctl restart bounce-cti
            sleep 2

            if sudo -n /bin/systemctl status bounce-cti > /dev/null 2>&1; then
              echo "==> Deploy OK! Commit: $(git rev-parse --short HEAD)"
            else
              echo "==> ERROR: service failed to start!"
              exit 1
            fi
